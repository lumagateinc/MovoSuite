name: Claude Code - Comment Responder

on:
  issue_comment:
    types: [created, edited]
  pull_request_review_comment:
    types: [created, edited]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    uses: lumagateinc/org-workflows/.github/workflows/_claude-comment-responder.yml@main
    secrets: inherit
    with:
      max-turns: 15
      allowed-tools: 'Bash(git log:*),Bash(git diff:*),Bash(grep:*)'
      allowed-bots: '*'
