name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - "tome-docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tome-docs/package-lock.json

      - name: Install dependencies
        working-directory: tome-docs
        run: npm ci

      - name: Build
        working-directory: tome-docs
        run: npx tome build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: tome-docs/out

      - id: deployment
        uses: actions/deploy-pages@v4
